<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峨眉山旅游系统 - API联调测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #2D5A4B;
            margin-bottom: 30px;
            text-align: center;
        }
        .test-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .btn {
            background: #2D5A4B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover {
            background: #3d7a63;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-box h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .result-box pre {
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        .data-render {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .data-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
        }
        .data-card h4 {
            color: #2D5A4B;
            margin-bottom: 8px;
        }
        .data-card p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-green {
            background: #28a745;
        }
        .status-red {
            background: #dc3545;
        }
        .login-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .login-form input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏔️ 峨眉山旅游系统 - API联调测试</h1>

        <!-- 后端状态检查 -->
        <div class="test-section">
            <h2><span class="status-indicator status-green"></span>后端服务状态检查</h2>
            <p>后端地址: http://localhost:8081</p>
            <button class="btn" onclick="checkBackendStatus()">检查后端连接</button>
            <div id="status-result" class="result-box"></div>
        </div>

        <!-- 跨域测试 -->
        <div class="test-section">
            <h2>🌐 跨域请求测试 (CORS)</h2>
            <button class="btn" onclick="testCors()">测试跨域请求</button>
            <div id="cors-result" class="result-box"></div>
        </div>

        <!-- 登录测试 -->
        <div class="test-section">
            <h2>👤 用户登录测试</h2>
            <div class="login-form">
                <input type="text" id="phone" value="13800138000" placeholder="手机号">
                <input type="password" id="password" value="123456" placeholder="密码">
                <button class="btn" onclick="testLogin()">测试登录</button>
            </div>
            <div id="login-result" class="result-box"></div>
        </div>

        <!-- 景点列表测试 -->
        <div class="test-section">
            <h2>🗺️ 景点列表接口测试 (点击事件模拟)</h2>
            <button class="btn" onclick="testScenicList()">获取景点列表</button>
            <button class="btn" onclick="renderScenicData()">渲染景点数据</button>
            <div id="scenic-result" class="result-box"></div>
            <div id="scenic-render" class="data-render"></div>
        </div>

        <!-- 票务列表测试 -->
        <div class="test-section">
            <h2>🎫 票务列表接口测试 (刷新事件模拟)</h2>
            <button class="btn" onclick="testTicketList()">获取票务列表</button>
            <button class="btn" onclick="renderTicketData()">渲染票务数据</button>
            <div id="ticket-result" class="result-box"></div>
            <div id="ticket-render" class="data-render"></div>
        </div>

        <!-- 公告列表测试 -->
        <div class="test-section">
            <h2>📢 公告/资讯接口测试</h2>
            <button class="btn" onclick="testNoticeList()">获取公告列表</button>
            <button class="btn" onclick="renderNoticeData()">渲染公告数据</button>
            <div id="notice-result" class="result-box"></div>
            <div id="notice-render" class="data-render"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        let authToken = '';

        function showResult(elementId, message, isSuccess = true) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<span class="${isSuccess ? 'success' : 'error'}">${isSuccess ? '✅ ' : '❌ '}${message}</span>`;
        }

        function showJsonResult(elementId, data) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<h3>响应数据:</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        // 1. 检查后端状态
        async function checkBackendStatus() {
            try {
                const response = await fetch(`${API_BASE}/scenic/list`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    showResult('status-result', '后端服务连接正常!', true);
                    showJsonResult('status-result', data);
                } else {
                    showResult('status-result', `连接失败: HTTP ${response.status}`, false);
                }
            } catch (error) {
                showResult('status-result', `连接错误: ${error.message}`, false);
            }
        }

        // 2. 跨域测试
        async function testCors() {
            try {
                const response = await fetch(`${API_BASE}/scenic/list`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                showResult('cors-result', '跨域请求成功! CORS配置正确。', true);
                showJsonResult('cors-result', data);
            } catch (error) {
                showResult('cors-result', `跨域请求失败: ${error.message}`, false);
            }
        }

        // 3. 登录测试
        async function testLogin() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await response.json();
                
                if (data.code === 200) {
                    authToken = data.data.token;
                    showResult('login-result', '登录成功! Token已保存。', true);
                    showJsonResult('login-result', data);
                } else {
                    showResult('login-result', `登录失败: ${data.msg}`, false);
                    showJsonResult('login-result', data);
                }
            } catch (error) {
                showResult('login-result', `登录请求失败: ${error.message}`, false);
            }
        }

        let scenicData = [];

        // 4. 景点列表测试
        async function testScenicList() {
            try {
                const response = await fetch(`${API_BASE}/scenic/list`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                scenicData = data.data || [];
                showResult('scenic-result', `成功获取 ${scenicData.length} 个景点!`, true);
                showJsonResult('scenic-result', data);
            } catch (error) {
                showResult('scenic-result', `获取景点失败: ${error.message}`, false);
            }
        }

        // 渲染景点数据
        function renderScenicData() {
            const container = document.getElementById('scenic-render');
            if (scenicData.length === 0) {
                container.innerHTML = '<p style="color: #999;">请先点击"获取景点列表"按钮</p>';
                return;
            }
            container.innerHTML = scenicData.map(spot => `
                <div class="data-card">
                    <h4>${spot.name}</h4>
                    <p><strong>副标题:</strong> ${spot.subtitle || '-'}</p>
                    <p><strong>海拔:</strong> ${spot.altitude || '-'}</p>
                    <p><strong>建议游玩时间:</strong> ${spot.playTime || '-'}</p>
                    <p><strong>标签:</strong> ${spot.tags || '-'}</p>
                    <p style="margin-top: 10px; color: #888;">${spot.description || ''}</p>
                </div>
            `).join('');
        }

        let ticketData = [];

        // 5. 票务列表测试
        async function testTicketList() {
            try {
                const response = await fetch(`${API_BASE}/ticket/list`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                ticketData = data.data || [];
                showResult('ticket-result', `成功获取 ${ticketData.length} 种票务!`, true);
                showJsonResult('ticket-result', data);
            } catch (error) {
                showResult('ticket-result', `获取票务失败: ${error.message}`, false);
            }
        }

        // 渲染票务数据
        function renderTicketData() {
            const container = document.getElementById('ticket-render');
            if (ticketData.length === 0) {
                container.innerHTML = '<p style="color: #999;">请先点击"获取票务列表"按钮</p>';
                return;
            }
            const typeMap = { 1: '大门票', 2: '索道票', 3: '观光车票', 4: '套票' };
            container.innerHTML = ticketData.map(ticket => `
                <div class="data-card">
                    <h4>${ticket.name}</h4>
                    <p><strong>类型:</strong> ${typeMap[ticket.type] || ticket.type}</p>
                    <p><strong>价格:</strong> ¥${ticket.price}</p>
                    <p><strong>库存:</strong> ${ticket.stock === -1 ? '不限' : ticket.stock}</p>
                    <p><strong>有效天数:</strong> ${ticket.validDays}天</p>
                    <p style="margin-top: 10px; color: #888;">${ticket.useRule || ''}</p>
                </div>
            `).join('');
        }

        let noticeData = [];

        // 6. 公告列表测试
        async function testNoticeList() {
            try {
                const response = await fetch(`${API_BASE}/notice/list`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                noticeData = data.data?.records || [];
                showResult('notice-result', `成功获取 ${noticeData.length} 条公告!`, true);
                showJsonResult('notice-result', data);
            } catch (error) {
                showResult('notice-result', `获取公告失败: ${error.message}`, false);
            }
        }

        // 渲染公告数据
        function renderNoticeData() {
            const container = document.getElementById('notice-render');
            if (noticeData.length === 0) {
                container.innerHTML = '<p style="color: #999;">请先点击"获取公告列表"按钮</p>';
                return;
            }
            const typeMap = { 1: '公告', 2: '资讯', 3: '攻略' };
            container.innerHTML = noticeData.map(notice => `
                <div class="data-card">
                    <h4>${notice.title}</h4>
                    <p><strong>类型:</strong> ${typeMap[notice.type] || notice.type}</p>
                    <p><strong>是否置顶:</strong> ${notice.isTop ? '是' : '否'}</p>
                    <p style="margin-top: 10px; color: #888;">${notice.summary || ''}</p>
                </div>
            `).join('');
        }

        // 页面加载时自动检查
        window.onload = () => {
            console.log('测试页面已加载，开始自动检查后端服务...');
            checkBackendStatus();
        };
    </script>
</body>
</html>
